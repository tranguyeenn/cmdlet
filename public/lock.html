<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyboard Locked</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui,
          sans-serif;
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
        overflow: hidden;
      }
      .card {
        box-sizing: border-box;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px;
        border-radius: 16px;
        background: rgba(17, 24, 39, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      .lock-icon {
        font-size: 34px;
        line-height: 1;
      }
      .title {
        font-size: 15px;
        font-weight: 600;
        color: #f9fafb;
      }
      .subtitle {
        font-size: 12px;
        color: #9ca3af;
        margin-top: -6px;
      }
      button {
        margin-top: 4px;
        padding: 10px 22px;
        font-size: 14px;
        font-weight: 600;
        color: #0b1220;
        background: #f9fafb;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.05s ease, background 0.15s ease;
      }
      button:hover {
        background: #ffffff;
      }
      button:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="lock-icon">🔒</div>
      <div class="title">Keyboard Locked</div>
      <div class="subtitle">All typing is blocked system-wide.</div>
      <button id="unlock" type="button" autofocus>Click to Unlock</button>
    </div>
    <script>
      const button = document.getElementById("unlock");
      button.addEventListener("click", async () => {
        button.disabled = true;
        button.textContent = "Unlocking…";
        try {
          await window.__TAURI__.core.invoke("unlock_keyboard");
        } catch (error) {
          button.disabled = false;
          button.textContent = "Click to Unlock";
        }
      });
    </script>
  </body>
</html>
